spring:
  application:
    name: budget-platform-backend
  datasource:
    url: ${BUDGET_PLATFORM_DB_URL:jdbc:postgresql://localhost:5432/budget_platform}
    username: ${BUDGET_PLATFORM_DB_USERNAME:budget_platform}
    password: ${BUDGET_PLATFORM_DB_PASSWORD:budget_platform}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  port: 8080

budget-platform:
  auth:
    mode: ${BUDGET_PLATFORM_AUTH_MODE:DEV_HEADER}
    allow-header-roles: ${BUDGET_PLATFORM_AUTH_ALLOW_HEADER_ROLES:false}
    reverse-proxy-user-header: ${BUDGET_PLATFORM_AUTH_REVERSE_PROXY_USER_HEADER:X-Forwarded-User}
    bootstrap-admin-users: ${BUDGET_PLATFORM_AUTH_BOOTSTRAP_ADMIN_USERS:}
    jwt:
      issuer: ${BUDGET_PLATFORM_AUTH_JWT_ISSUER:}
      audience: ${BUDGET_PLATFORM_AUTH_JWT_AUDIENCE:}
      jwks-uri: ${BUDGET_PLATFORM_AUTH_JWT_JWKS_URI:}
      username-claim: ${BUDGET_PLATFORM_AUTH_JWT_USERNAME_CLAIM:sub}
      clock-skew-seconds: ${BUDGET_PLATFORM_AUTH_JWT_CLOCK_SKEW_SECONDS:60}
      max-token-length: ${BUDGET_PLATFORM_AUTH_JWT_MAX_TOKEN_LENGTH:8192}
      allowed-algorithms: ${BUDGET_PLATFORM_AUTH_JWT_ALLOWED_ALGORITHMS:RS256}
