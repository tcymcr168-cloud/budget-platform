spring:
  datasource:
    url: jdbc:h2:mem:budget_platform;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

budget-platform:
  auth:
    mode: DEV_HEADER
    allow-header-roles: true
    bootstrap-admin-users: admin@example.com
